<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Family Travel</title>
    <style>
      :root {
        --bg: #f7f8fb;
        --text: #14234a;
        --accent: #c8a75d;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Avenir Next", "Segoe UI", Roboto, Arial, sans-serif;
        color: var(--text);
        background: var(--bg);
      }

      header {
        background: white;
        border-bottom: 1px solid #e7ebf2;
        padding: 8px 16px;
      }

      .header-wrap {
        max-width: 1100px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .logo {
        height: 110px;
        width: auto;
        object-fit: contain;
      }

      .site-title {
        font-size: clamp(1.05rem, 2.8vw, 1.6rem);
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--accent);
        margin: 0;
        white-space: nowrap;
      }

      main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 48px 16px;
      }

      .hero {
        background: white;
        border: 1px solid #e7ebf2;
        border-radius: 16px;
        padding: 28px;
      }

      .hero h1 {
        margin: 0 0 12px;
        font-size: clamp(1.6rem, 4vw, 2.4rem);
      }

      .hero p {
        margin: 0;
        line-height: 1.6;
        color: #37456f;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-wrap">
        <img class="logo" src="assets/base-logo-ultra-tight.png" alt="BASE family travel logo" />
        <p class="site-title">BASE Family Travel</p>
      </div>
    </header>

    <main>
      <section class="hero">
        <h1>Family Travel</h1>
        <p>Planning memories, one trip at a time.</p>
      </section>
    </main>
  </body>
</html>
